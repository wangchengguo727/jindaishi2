<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>中国近现代史刷题网站</title>
  <style>
    :root {
      --bg:#f5f7fb; --card:#ffffff; --text:#162033; --muted:#657186;
      --primary:#2563eb; --primary-dark:#1d4ed8; --green:#16a34a; --red:#dc2626;
      --amber:#f59e0b; --line:#e5e9f2; --soft:#eef4ff;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif; background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 160px); color:var(--text); }
    .app { width:min(760px,100%); margin:0 auto; padding:16px 14px 96px; }
    .hero { padding:20px 4px 12px; }
    .title { margin:0; font-size:26px; font-weight:850; letter-spacing:-0.5px; }
    .sub { margin:8px 0 0; color:var(--muted); font-size:14px; line-height:1.6; }
    .card { background:rgba(255,255,255,.96); border:1px solid rgba(229,233,242,.9); border-radius:22px; box-shadow:0 14px 34px rgba(22,32,51,.08); padding:16px; margin:12px 0; }
    .grid { display:grid; gap:12px; }
    label.field { display:block; }
    .field span { display:block; font-size:13px; color:var(--muted); margin:0 0 6px; }
    select, input[type="number"] { width:100%; border:1px solid var(--line); border-radius:14px; padding:12px 12px; font-size:16px; color:var(--text); background:white; outline:none; }
    .seg { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .seg label { display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:16px; padding:12px; background:#fff; font-size:14px; line-height:1.35; }
    .seg input { width:18px; height:18px; accent-color:var(--primary); }
    .switch { display:flex; align-items:center; justify-content:space-between; gap:12px; border:1px solid var(--line); border-radius:16px; padding:12px; background:#fff; }
    .switch b { font-size:15px; }
    .switch small { display:block; color:var(--muted); line-height:1.45; margin-top:3px; }
    .switch input { width:22px; height:22px; accent-color:var(--primary); }
    .btn { border:0; border-radius:16px; padding:13px 16px; font-size:16px; font-weight:800; background:var(--primary); color:white; width:100%; cursor:pointer; box-shadow:0 10px 20px rgba(37,99,235,.22); }
    .btn:active { transform:translateY(1px); }
    .btn.secondary { background:#fff; color:var(--primary); border:1px solid #bfdbfe; box-shadow:none; }
    .btn.ghost { background:transparent; color:var(--muted); border:1px solid var(--line); box-shadow:none; }
    .btn.danger { background:var(--red); }
    .btn.ok { background:var(--green); }
    .btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; }
    .stat { background:#fff; border:1px solid var(--line); border-radius:16px; padding:10px; }
    .stat b { display:block; font-size:20px; }
    .stat span { font-size:12px; color:var(--muted); }
    .topbar { position:sticky; top:0; z-index:10; margin:-16px -14px 12px; padding:10px 14px; backdrop-filter:blur(14px); background:rgba(245,247,251,.82); border-bottom:1px solid rgba(229,233,242,.7); }
    .barline { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .pill { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:7px 10px; background:#fff; border:1px solid var(--line); font-size:13px; color:var(--muted); }
    .progress { height:8px; background:#e6edfb; border-radius:99px; overflow:hidden; margin-top:10px; }
    .progress > div { height:100%; width:0%; background:linear-gradient(90deg,var(--primary),#60a5fa); transition:.25s; }
    .qmeta { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
    .tag { font-size:12px; color:#1e40af; background:#dbeafe; border-radius:999px; padding:5px 9px; font-weight:700; }
    .tag.multi { color:#92400e; background:#fef3c7; }
    .qtitle { font-size:20px; line-height:1.55; margin:8px 0 14px; font-weight:800; }
    .source { color:var(--muted); font-size:12px; line-height:1.45; }
    .options { display:grid; gap:10px; }
    .option { display:grid; grid-template-columns:30px 1fr; align-items:start; gap:10px; border:1px solid var(--line); border-radius:17px; padding:13px; background:#fff; line-height:1.55; cursor:pointer; user-select:none; }
    .option .letter { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#f1f5f9; font-weight:900; color:#475569; }
    .option input { display:none; }
    .option.selected { border-color:#93c5fd; background:#eff6ff; }
    .option.selected .letter { background:var(--primary); color:#fff; }
    .option.correct { border-color:#86efac; background:#f0fdf4; }
    .option.correct .letter { background:var(--green); color:white; }
    .option.wrong { border-color:#fecaca; background:#fef2f2; }
    .option.wrong .letter { background:var(--red); color:white; }
    .explain { display:none; margin-top:14px; padding:13px; border-radius:16px; background:#f8fafc; border:1px dashed #cbd5e1; line-height:1.65; }
    .explain.show { display:block; }
    .explain b.ok { color:var(--green); }
    .explain b.bad { color:var(--red); }
    .bottom { position:fixed; left:0; right:0; bottom:0; z-index:20; padding:10px 14px calc(10px + env(safe-area-inset-bottom)); background:rgba(255,255,255,.92); backdrop-filter:blur(16px); border-top:1px solid var(--line); }
    .bottom-inner { width:min(760px,100%); margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .bottom-inner.three { grid-template-columns:1fr 1fr 1.2fr; }
    .review-item { border:1px solid var(--line); border-radius:18px; background:#fff; padding:13px; margin:10px 0; }
    .review-head { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
    .review-q { font-weight:750; line-height:1.55; }
    .answer-line { font-size:14px; line-height:1.6; color:#334155; margin-top:8px; }
    .right { color:var(--green); font-weight:900; }
    .wrongTxt { color:var(--red); font-weight:900; }
    .hide { display:none !important; }
    .empty { text-align:center; color:var(--muted); padding:22px 8px; }
    .smallnote { font-size:12px; color:var(--muted); line-height:1.6; margin-top:10px; }
    @media (min-width:640px) {
      .grid.two { grid-template-columns:1fr 1fr; }
      .title { font-size:32px; }
      .qtitle { font-size:22px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="home">
      <div class="hero">
        <h1 class="title">中国近现代史刷题</h1>
        <p class="sub">共 <b id="totalCount"></b> 道题。手机端单文件网页，刷新或重新开始都会重新打乱题目。</p>
      </div>
      <div class="card grid">
        <label class="field"><span>题库范围</span><select id="sourceSelect"></select></label>
        <div class="grid two">
          <label class="field"><span>题型</span><select id="typeSelect"><option value="all">全部题型</option><option value="单选题">只刷单选</option><option value="多选题">只刷多选</option></select></label>
          <label class="field"><span>本次题数</span><select id="countSelect"><option value="all">全部</option><option value="10">10 题</option><option value="20">20 题</option><option value="30">30 题</option><option value="50">50 题</option><option value="100">100 题</option></select></label>
        </div>
        <div>
          <div class="field"><span>出答案方式</span></div>
          <div class="seg">
            <label><input type="radio" name="mode" value="instant" checked><span>做一题<br>出一题答案</span></label>
            <label><input type="radio" name="mode" value="final"><span>全部做完<br>再出答案</span></label>
          </div>
        </div>
        <label class="switch">
          <span><b>每次随机打乱</b><small>默认开启，适合反复刷题。</small></span>
          <input type="checkbox" id="shuffleToggle" checked>
        </label>
        <button class="btn" id="startBtn">开始刷题</button>
        <div class="stats" id="homeStats"></div>
      </div>
    </section>

    <section id="quiz" class="hide">
      <div class="topbar">
        <div class="barline">
          <span class="pill" id="progressText">第 1 / 1 题</span>
          <span class="pill" id="scoreText">已答 0｜正确 0</span>
        </div>
        <div class="progress"><div id="progressFill"></div></div>
      </div>
      <div class="card">
        <div class="qmeta">
          <span id="typeTag" class="tag">单选题</span>
          <span class="tag" id="sourceTag">题库</span>
        </div>
        <div class="source" id="qSource"></div>
        <h2 class="qtitle" id="qTitle"></h2>
        <div class="options" id="options"></div>
        <div class="explain" id="explain"></div>
      </div>
    </section>

    <section id="result" class="hide">
      <div class="hero">
        <h1 class="title">本次结果</h1>
        <p class="sub" id="resultSummary"></p>
      </div>
      <div class="card grid">
        <div class="stats" id="resultStats"></div>
        <button class="btn" id="retryWrongBtn">只刷本次错题</button>
        <button class="btn secondary" id="restartBtn">重新随机开始</button>
      </div>
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:18px;">答案回顾</h3>
        <div id="reviewList"></div>
      </div>
    </section>
  </main>

  <div class="bottom hide" id="bottomBar"><div class="bottom-inner" id="bottomInner"></div></div>

<script>

const SOURCES = [{"id": "S1", "title": "练习题（二）｜社会主义建设与改革开放", "count": 40}, {"id": "S2", "title": "练习题｜新文化运动至社会主义改造", "count": 56}, {"id": "S3", "title": "纲要练习试卷｜1840年至辛亥革命等", "count": 40}];
const $ = (id) => document.getElementById(id);
const letters = ['A','B','C','D'];
let state = null;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function answerText(q, ans) {
  if (!ans || ans.length === 0) return '未作答';
  return ans.split('').map(l => `${l}. ${q.options[l] || ''}`).join('；');
}
function sameAnswer(a, b) {
  return (a || []).slice().sort().join('') === (b || '').split('').sort().join('');
}
function chosenString(q) { return (state.answers[q.id] || []).slice().sort().join(''); }
function isAnswered(q) { return (state.answers[q.id] || []).length > 0; }
function correctCount() { return state.questions.filter(q => sameAnswer(state.answers[q.id] || [], q.answer)).length; }
function answeredCount() { return state.questions.filter(q => isAnswered(q)).length; }
function getMode() { return document.querySelector('input[name="mode"]:checked').value; }

function initHome() {
  $('totalCount').textContent = QUESTION_BANK.length;
  const sourceSelect = $('sourceSelect');
  sourceSelect.innerHTML = `<option value="all">全部题库（${QUESTION_BANK.length} 题）</option>` + SOURCES.map(s => `<option value="${s.id}">${s.title}（${s.count} 题）</option>`).join('');
  const single = QUESTION_BANK.filter(q => q.type === '单选题').length;
  const multi = QUESTION_BANK.filter(q => q.type === '多选题').length;
  $('homeStats').innerHTML = `
    <div class="stat"><b>${QUESTION_BANK.length}</b><span>总题数</span></div>
    <div class="stat"><b>${single}</b><span>单选题</span></div>
    <div class="stat"><b>${multi}</b><span>多选题</span></div>`;
}

function buildPool(customPool=null) {
  let pool = customPool ? customPool.slice() : QUESTION_BANK.slice();
  if (!customPool) {
    const sid = $('sourceSelect').value;
    const typ = $('typeSelect').value;
    if (sid !== 'all') pool = pool.filter(q => q.sourceId === sid);
    if (typ !== 'all') pool = pool.filter(q => q.type === typ);
    if ($('shuffleToggle').checked) pool = shuffle(pool);
    const countValue = $('countSelect').value;
    if (countValue !== 'all') pool = pool.slice(0, Math.min(Number(countValue), pool.length));
  } else {
    pool = $('shuffleToggle').checked ? shuffle(pool) : pool;
  }
  return pool;
}

function startQuiz(customPool=null) {
  const pool = buildPool(customPool);
  if (!pool.length) { alert('当前筛选没有题目，请换一个范围。'); return; }
  state = {
    questions: pool,
    index: 0,
    mode: getMode(),
    answers: Object.fromEntries(pool.map(q => [q.id, []])),
    checked: Object.fromEntries(pool.map(q => [q.id, false])),
    submitted: false,
    lastWrong: []
  };
  $('home').classList.add('hide');
  $('result').classList.add('hide');
  $('quiz').classList.remove('hide');
  $('bottomBar').classList.remove('hide');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.index];
  const idx = state.index + 1;
  $('progressText').textContent = `第 ${idx} / ${state.questions.length} 题`;
  $('scoreText').textContent = state.mode === 'instant'
    ? `已答 ${answeredCount()}｜正确 ${correctCount()}`
    : `已答 ${answeredCount()}｜未交卷`;
  $('progressFill').style.width = `${(idx-1) / state.questions.length * 100}%`;
  $('typeTag').textContent = q.type;
  $('typeTag').className = q.type === '多选题' ? 'tag multi' : 'tag';
  $('sourceTag').textContent = q.id;
  $('qSource').textContent = `${q.source}｜原第 ${q.number} 题`;
  $('qTitle').textContent = q.question;
  const selected = state.answers[q.id] || [];
  const locked = state.checked[q.id] || state.submitted;
  $('options').innerHTML = letters.map(l => {
    const isSel = selected.includes(l);
    let cls = 'option' + (isSel ? ' selected' : '');
    if (locked) {
      if (q.answer.includes(l)) cls += ' correct';
      else if (isSel) cls += ' wrong';
    }
    const inputType = q.type === '单选题' ? 'radio' : 'checkbox';
    return `<label class="${cls}" data-letter="${l}">
      <input type="${inputType}" name="opt" value="${l}" ${isSel ? 'checked' : ''} ${locked ? 'disabled' : ''}>
      <span class="letter">${l}</span><span>${escapeHtml(q.options[l])}</span>
    </label>`;
  }).join('');
  document.querySelectorAll('.option').forEach(label => {
    label.addEventListener('click', (e) => {
      if (locked) return;
      const l = label.dataset.letter;
      if (q.type === '单选题') state.answers[q.id] = [l];
      else {
        const set = new Set(state.answers[q.id] || []);
        set.has(l) ? set.delete(l) : set.add(l);
        state.answers[q.id] = Array.from(set).sort();
      }
      renderQuestion();
    });
  });
  renderExplain(q, locked);
  renderBottom();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
}

function renderExplain(q, show) {
  const ok = sameAnswer(state.answers[q.id] || [], q.answer);
  $('explain').className = show ? 'explain show' : 'explain';
  $('explain').innerHTML = show ? `
    <div>${ok ? '<b class="ok">回答正确</b>' : '<b class="bad">回答错误</b>'}</div>
    <div>你的答案：${escapeHtml(answerText(q, chosenString(q)))}</div>
    <div>正确答案：<b>${q.answer}</b>　${escapeHtml(answerText(q, q.answer))}</div>` : '';
}

function renderBottom() {
  const q = state.questions[state.index];
  const selected = isAnswered(q);
  const checked = state.checked[q.id];
  const last = state.index === state.questions.length - 1;
  const bottom = $('bottomInner');
  if (state.mode === 'instant') {
    bottom.className = 'bottom-inner three';
    bottom.innerHTML = `
      <button class="btn ghost" id="prevBtn" ${state.index===0?'disabled':''}>上一题</button>
      <button class="btn ${checked ? 'secondary' : 'ok'}" id="checkBtn" ${(!selected || checked)?'disabled':''}>提交本题</button>
      <button class="btn" id="nextBtn">${last ? '查看结果' : '下一题'}</button>`;
    $('prevBtn').onclick = () => { if (state.index > 0) { state.index--; renderQuestion(); } };
    $('checkBtn').onclick = () => { state.checked[q.id] = true; renderQuestion(); };
    $('nextBtn').onclick = () => {
      if (!checked && selected) { state.checked[q.id] = true; renderQuestion(); return; }
      if (last) finishQuiz(); else { state.index++; renderQuestion(); }
    };
  } else {
    bottom.className = 'bottom-inner three';
    bottom.innerHTML = `
      <button class="btn ghost" id="prevBtn" ${state.index===0?'disabled':''}>上一题</button>
      <button class="btn secondary" id="nextBtn">${last ? '停在本题' : '下一题'}</button>
      <button class="btn" id="submitBtn">交卷看答案</button>`;
    $('prevBtn').onclick = () => { if (state.index > 0) { state.index--; renderQuestion(); } };
    $('nextBtn').onclick = () => { if (!last) { state.index++; renderQuestion(); } };
    $('submitBtn').onclick = () => {
      const un = state.questions.length - answeredCount();
      if (un > 0 && !confirm(`还有 ${un} 道题未作答，确定交卷吗？`)) return;
      finishQuiz();
    };
  }
}

function finishQuiz() {
  state.submitted = true;
  state.questions.forEach(q => state.checked[q.id] = true);
  const total = state.questions.length;
  const right = correctCount();
  const wrong = total - right;
  const percent = Math.round(right / total * 100);
  state.lastWrong = state.questions.filter(q => !sameAnswer(state.answers[q.id] || [], q.answer));
  $('quiz').classList.add('hide');
  $('bottomBar').classList.add('hide');
  $('result').classList.remove('hide');
  $('resultSummary').textContent = `本次共 ${total} 题，答对 ${right} 题，答错/未答 ${wrong} 题，正确率 ${percent}%。`;
  $('resultStats').innerHTML = `
    <div class="stat"><b>${right}</b><span>答对</span></div>
    <div class="stat"><b>${wrong}</b><span>答错/未答</span></div>
    <div class="stat"><b>${percent}%</b><span>正确率</span></div>`;
  $('retryWrongBtn').disabled = state.lastWrong.length === 0;
  $('retryWrongBtn').textContent = state.lastWrong.length ? `只刷本次错题（${state.lastWrong.length}题）` : '本次没有错题';
  renderReview();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderReview() {
  const list = $('reviewList');
  list.innerHTML = state.questions.map((q, i) => {
    const chosen = chosenString(q);
    const ok = sameAnswer(state.answers[q.id] || [], q.answer);
    return `<div class="review-item">
      <div class="review-head"><span class="tag ${q.type==='多选题'?'multi':''}">${q.type}</span><span class="tag">${i+1}/${state.questions.length}</span><span class="${ok?'right':'wrongTxt'}">${ok?'正确':'错误'}</span></div>
      <div class="source">${escapeHtml(q.source)}｜原第 ${q.number} 题</div>
      <div class="review-q">${escapeHtml(q.question)}</div>
      <div class="answer-line">你的答案：${escapeHtml(answerText(q, chosen))}</div>
      <div class="answer-line">正确答案：<b>${q.answer}</b>　${escapeHtml(answerText(q, q.answer))}</div>
    </div>`;
  }).join('') || '<div class="empty">没有回顾内容</div>';
}

$('startBtn').onclick = () => startQuiz();
$('restartBtn').onclick = () => { $('result').classList.add('hide'); $('home').classList.remove('hide'); window.scrollTo({top:0, behavior:'smooth'}); };
$('retryWrongBtn').onclick = () => { if (state && state.lastWrong.length) startQuiz(state.lastWrong); };
initHome();
</script>
</body>
</html>
